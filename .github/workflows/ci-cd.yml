name: CI/CD Pipeline

on:
  push:
    branches: ['**']        # S'exécute sur TOUTES les branches lors d'un push
    tags:
      - 'v*.*.*'            # S'exécute lors du push d'un tag de version (ex: v1.0.2)
  pull_request:
    branches: [main]        # S'exécute lors d'une PR ciblant la branche main

jobs:
  # --- ÉTAPE 1 : QUALITÉ DU CODE & TESTS ---
  unit-tests-and-lint:
    name: "Tests & Lint"
    runs-on: ubuntu-latest
    
    # Services Docker (Sidecars) lancés pour les tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test_password_dev
          POSTGRES_DB: test_db
        options: >- # Vérifie que la DB est prête avant de continuer
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Active le cache automatique des node_modules

      - name: Install dependencies
        run: npm ci # Installation stricte basée sur le package-lock.json

      - name: Lint & type check
        run: |
          npm run lint      # Analyse statique du code
          npx tsc --noEmit  # Vérifie les erreurs TypeScript sans compiler

      - name: Run unit tests
        run: npm test -- --coverage --forceExit
        env: # Variables d'environnement pour connecter l'app aux services ci-dessus
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: test
          DB_PASSWORD: test_password_dev
          DB_DATABASE: test_db
          DB_TYPE: postgres
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_jwt_secret_ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always() # Exécuté même si les tests échouent
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Publish coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # --- ÉTAPE 2 : CONSTRUCTION DE L'IMAGE (BUILD) ---
  docker-build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    needs: unit-tests-and-lint # Dépend du succès des tests
    outputs: # Exporte les variables pour les jobs suivants
      tags:    ${{ steps.meta.outputs.tags }}
      labels:  ${{ steps.meta.outputs.labels }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata # Calcule intelligemment les tags (sha, latest, semver)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKER_USERNAME }}/test-app
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false # On ne pousse pas encore au registry (test de build uniquement)
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha # Utilise le cache GitHub Actions pour accélérer
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload image artifact # Sauvegarde l'image en tant qu'artefact de job
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # --- ÉTAPE 3 : PUBLICATION (PUSH) ---
  docker-push:
    name: "Push to Registry"
    runs-on: ubuntu-latest
    needs: docker-build
    # Condition : uniquement sur main ou lors d'un tag de version
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract Docker metadata # Recalcule les tags pour le push
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKER_USERNAME }}/test-app
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true # Envoi effectif vers le Docker Hub
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push summary
        run: | # Affiche un joli tableau récapitulatif dans l'interface GitHub
          echo "### Images publiées sur Docker Hub" >> $GITHUB_STEP_SUMMARY
          echo "| Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|" >> $GITHUB_STEP_SUMMARY
          while IFS= read -r tag; do
            echo "| \`$tag\` |" >> $GITHUB_STEP_SUMMARY
          done <<< "${{ steps.meta.outputs.tags }}"

  # --- ÉTAPE 4 : DÉPLOIEMENT STAGING ---
  deploy-staging:
    name: "Deploy to Staging"
    runs-on: ubuntu-latest
    needs: docker-push
    if: github.ref == 'refs/heads/main' # Branche main uniquement
    environment:
      name: staging
      url: https://staging.test-app.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract image tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKER_USERNAME }}/test-app
          tags: type=sha,prefix=sha-

      - name: Deploy to staging
        run: | # Simulation de commandes de déploiement (docker run, docker-compose up, etc.)
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          echo "DÉPLOIEMENT STAGING : $IMAGE"

  # --- ÉTAPE 5 : DÉPLOIEMENT PRODUCTION ---
  deploy-production:
    name: "Deploy to Production"
    runs-on: ubuntu-latest
    needs: docker-push
    if: startsWith(github.ref, 'refs/tags/v') # Tags 'v*' uniquement
    environment:
      name: production
      url: https://test-app.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract image tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKER_USERNAME }}/test-app
          tags: type=semver,pattern={{version}}

      - name: Deploy to production
        run: | # Commandes simulées pour la prod
          VERSION="${{ steps.meta.outputs.version }}"
          echo "DÉPLOIEMENT PRODUCTION VERSION : $VERSION"